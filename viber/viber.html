<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <title>Fake Viber Chat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<a href="config.html">
  <img src="../img/back.png" alt="Back" id="backBtn" class="back-btn-top-left" />
</a>

<div class="lang-switcher-container">
  <div class="lang-switcher">
    <button data-lang="ro" class="lang-btn active">RO</button>
    <button data-lang="ru" class="lang-btn">RU</button>
    <button data-lang="en" class="lang-btn">EN</button>
  </div>
</div>

<div class="icon-box">
  <div class="new-chat"> 
    <img id="newchatIcon" src="Vimg/new-chat.png" alt="Chat nou" />
  </div> 
  <img id="deleteAllBtn" src="Vimg/bin.png" alt="Șterge toate mesajele">
  <img id="screenshotIcon" src="Vimg/screenshot.png" alt="Screenshot" />
  <img id="notesIcon" src="Vimg/notes.png" alt="Notite" />
  <img id="changebackgroundIcon" src="Vimg/change-background.png" alt="Schimbă fonul" />
</div>

<div id="confirmOverlay">
  <div id="confirmBox">
    <p class="deleteAllQuestion">Ești sigur că vrei să ștergi toate mesajele?</p>
    <div class="buttons">
        <button id="confirmNo" class="deleteAllCancel">Nu</button>      
        <button id="confirmYes" class="deleteAllConfirm">Da</button>
    </div>
  </div>
</div>

<div id="notesBox" class="draggable-notes" style="display:none;">
  <div class="notes-header">
    <span>Notițe</span>
    <button id="closeNotes">×</button>
  </div>
  <textarea id="notesText" placeholder="Scrie aici "></textarea>
  <div class="notes-footer">
    <button id="saveNotes">Salvează</button>
    <button id="clearNotes">Șterge</button>
  </div>
</div>

<div id="date-modal-backdrop" class="date-modal-backdrop"></div>
<div id="date-modal" class="date-modal">
  <button class="date-close-btn">×</button>
  <span class="date-modal-label">Setează data:</span>
  <input type="text" id="date-input" class="date-modal-input" value="">
  <button id="save-date-btn" class="date-modal-btn">Salvează</button>
</div>

<div class="categories-open">
  <img id="OpenCategories" src="Vimg/arrow-down.png" alt="Schimbă rolul" />
</div>  

<div class="role-changebox">
  <img id="roleToggleIcon" src="Vimg/change.png" alt="Schimbă rolul" />
</div>  

  <div class="chat-window">
    <div class="chat-header">
          <img src="Vimg/back.png" alt="Back" width="20" height="20" class="back-arrow"/>
          <div style="flex:1; display:flex; flex-direction:column; align-items:flex-start; justify-content:center; margin-left:1px;">
            <span class="chat-name" style="font-size:15px; font-weight:700; color:#23232b;"> </span>
            <span class="chat-status" style="font-size:13px; color:#7d7d7d; margin-top:2px;"> </span>
          </div>
          <div class="icons" style="margin-left:auto;">
            <img src="Vimg/call.png" alt="Phone" class="icon-call" />
            <img src="Vimg/camera.png" alt="Camera" class="icon-camera" />
            <img src="Vimg/dots.png" alt="Menu" class="icon-dots" />
          </div>
    </div>

 <div class="chat-body" id="chat-body">
  <div class="date-label" id="chatDate"> 
  </div>

<div class="chat-input-bar">
  <img src="Vimg/add.png" alt="Plus" class="left-icon" />
  <div class="chat-input">
    <input type="text" id="msg" placeholder="Mesaj..." />
    <img src="Vimg/emojy.png" alt="Emoji" class="inside-icon" />
    <img src="Vimg/gallery.png" alt="Imagine" class="inside-icon-gallery" />
  </div>
  <div class="send-btn">
      <div id="microSendBtnContainer">
        <img src="Vimg/micro.png" alt="Microfon" id="microSendBtn" />
      </div>
  </div>
</div>
</div>
</div>

<div id="backgroundMenu" class="background-menu" style="display:none;"> 
  <div class="bg-mode-switch">
    <button id="setDayBgBtn" class="bg-mode-btn active">Ziua</button>
    <button id="setNightBgBtn" class="bg-mode-btn">Noapte</button>
  </div>

  <div class="background-options">
    <div class="bg-option custom-bg-option" id="customBackgroundBtn" title="Încarcă fundal personalizat">
    <img src="Vimg/add-img.png" alt="Fundal personalizat" class="custom-bg-icon">
  </div>
</div> 
</div> 

  <div class="theme-toggle">
    <label class="switch">
      <input type="checkbox" id="checkbox" />
      <span class="slider">
        <div class="star star_1"></div>
        <div class="star star_2"></div>
        <div class="star star_3"></div>
        <svg viewBox="0 0 16 16" class="cloud cloud_1">
          <path
            transform="matrix(.77976 0 0 .78395-299.99-418.63)"
            fill="#fff"
            d="m391.84 540.91c-.421-.329-.949-.524-1.523-.524-1.351 0-2.451 1.084-2.485 2.435-1.395.526-2.388 1.88-2.388 3.466 0 1.874 1.385 3.423 3.182 3.667v.034h12.73v-.006c1.775-.104 3.182-1.584 3.182-3.395 0-1.747-1.309-3.186-2.994-3.379.007-.106.011-.214.011-.322 0-2.707-2.271-4.901-5.072-4.901-2.073 0-3.856 1.202-4.643 2.925"
          ></path>
        </svg>
      </span>
    </label>
  </div>

<div class="modal-backdrop" id="modalBackdrop"></div>
<div class="modal" id="timeModal">
  <div class="modal-header">
    <button id="closeTimeModal" aria-label="Închide fereastra" title="Închide" class="close-btn">×</button>
  </div>
  <label for="newTime" class="modal-label">Setează ora:</label>
  <input type="text" id="newTime" />
  <button id="saveTime">Salvează</button>
</div>

  <div id="contextMenu" style="display:none; position:absolute; z-index:1000; border-radius:8px; box-shadow:0 2px 8px #00000026; min-width:120px; font-size:15px;">
    <button id="replyMsg" style="padding:8px 16px; cursor:pointer;">Răspunde </button>
    <div id="deleteMsg" style="padding:8px 16px; cursor:pointer;">Șterge mesajul</div>
    <div id="editMsg" style="padding:8px 16px; cursor:pointer;">Schimbă mesajul</div>
  </div>

  <script src="script.js"></script>

<svg width="0" height="0" style="position: absolute;">
  <defs>
    <clipPath id="squircleClip" clipPathUnits="objectBoundingBox">
      <path d="M 0,0.5 C 0,0 0,0 0.5,0 S 1,0 1,0.5 1,1 0.5,1 0,1 0,0.5"></path>
    </clipPath>
  </defs>
</svg>
<div class="social-buttons-bottom-left">
  <div class="social-btns-main-box">
    <div class="social-btn-group">
  <div class="social-btn telegram"><a href="../telegram/config.html" class="social-btn-inner" title="Telegram"><img src="../img/telegram1.png" alt="Telegram" class="social-btn-icon" /></a></div>
  <div class="social-btn instagram"><a href="../instagram/config.html" class="social-btn-inner" target="_blank" rel="noopener" title="Instagram"><img src="../img/instagram1.png" alt="Instagram" class="social-btn-icon" /></a></div>
  <div class="social-btn viber"><a href="../viber/config.html" class="social-btn-inner" title="Viber"><img src="../img/viber1.png" alt="Viber" class="social-btn-icon" /></a></div>
  <div class="social-btn home"><a href="../index.html" class="social-btn-inner" title="Home"><img src="../img/home.png" alt="Home" class="social-btn-icon" /></a></div>
    </div>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
